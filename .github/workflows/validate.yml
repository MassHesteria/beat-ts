name: Validate

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          repository: 'MassHesteria/beat'
          path: 'beat-cpp'

      - name: Install GTK2
        run: |
          sudo apt-add-repository "deb http://archive.ubuntu.com/ubuntu/ focal universe"
          sudo apt-get update
          sudo apt-get install -y libgtk2.0-dev libgtksourceview2.0-dev libx11-dev

      - name: make
        run: |
          cd beat-cpp/beat
          mkdir -p obj
          mkdir -p out
          sed -i '/#pragma once/a #include <stdexcept>' ../hiro/hiro.hpp
          sed -i '/#pragma once/a #include <stdexcept>' ../nall/platform.hpp
          sed -i '1s/^/#include <stdexcept>\n/' beat.hpp
          make

      - name: run
        run: |
          cd beat-cpp/beat
          touch a.txt
          out/beat -create:bps create_beat.bps a.txt beat.cpp
          out/beat -apply:bps create_beat.bps a.txt patched.cpp
          sha256sum create_beat.bps
          sha256sum beat.cpp
          sha256sum patched.cpp
          pwd

      - name: ts-run
        run: |
          pwd
          ls -l
          bun run beat.ts -create:bps create_beat.bps beat-cpp/beat/a.txt beat-cpp/beat/beat.cpp
          sha256sum create_beat.bps
          sha256sum beat-cpp/beat/create_beat.bps

