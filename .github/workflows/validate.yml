name: Validate

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Unit Tests
        run: |
          bun test

      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          repository: 'MassHesteria/beat'
          path: 'beat-cpp'

      - name: Install GTK2
        run: |
          sudo apt-add-repository "deb http://archive.ubuntu.com/ubuntu/ focal universe"
          sudo apt-get update
          sudo apt-get install -y libgtk2.0-dev libgtksourceview2.0-dev libx11-dev

      - name: make
        run: |
          cd beat-cpp/beat
          mkdir -p obj
          mkdir -p out
          sed -i '/#pragma once/a #include <stdexcept>' ../hiro/hiro.hpp
          sed -i '/#pragma once/a #include <stdexcept>' ../nall/platform.hpp
          sed -i '1s/^/#include <stdexcept>\n/' beat.hpp
          make

      - name: Compression Tests
        run: |
          function compress_test {
            local org_bytes=$(stat -c%s "$1")
            touch a.txt
            beat-cpp/beat/out/beat -create:bps cpp_patch.bps a.txt $1 > /dev/null
            beat-cpp/beat/out/beat -apply:bps cpp_patch.bps a.txt patched.cpp > /dev/null
            diff $1 patched.cpp
            rm patched.cpp
            local pat_bytes=$(stat -c%s "cpp_patch.bps")
            local percent=$(( pat_bytes * 100 / org_bytes ))
            bun run beat.ts -create:bps ts_patch.bps a.txt $1 > /dev/null
            diff cpp_patch.bps ts_patch.bps && echo "$1 compress passed: $org_bytes -> $pat_bytes ($percent%)"
          }
          compress_test beat-cpp/beat/beat.cpp || exit 1
          compress_test beat-cpp/hiro/hiro.cpp || exit 1
          compress_test beat-cpp/nall/nall.hpp || exit 1
          compress_test beat-cpp/beat/out/beat || exit 1
          compress_test beat-cpp/beat/resource/beat.png || exit 1
          compress_test beat-cpp/beat/resource/beat.ico || exit 1

      - name: Patch Tests
        run: |
          function patch_test {
            beat-cpp/beat/out/beat -create:bps cpp_patch.bps $1 $2 > /dev/null
            beat-cpp/beat/out/beat -apply:bps cpp_patch.bps $1 patched.file > /dev/null
            diff $2 patched.file
            rm patched.file
            bun run beat.ts -create:bps ts_patch.bps $1 $2 > /dev/null
            diff cpp_patch.bps ts_patch.bps && echo "$1 -> $2 passed"
          }
          patch_test beat-cpp/beat/resource/beat.ico beat-cpp/beat/resource/beat.png || exit 1
          patch_test beat-cpp/beat/beat.hpp beat-cpp/beat/beat.cpp || exit 1
          patch_test beat-cpp/hiro/hiro.hpp beat-cpp/hiro/hiro.cpp || exit 1

      - name: Fonzie Test
        run: |
          dd if=/dev/zero bs=1 count=1024 | tr '\0' 'a' > a1.txt
          dd if=/dev/zero bs=1 count=10240 | tr '\0' 'a' > a2.txt
          beat-cpp/beat/out/beat -create:bps cpp_patch.bps a1.txt a2.txt
          beat-cpp/beat/out/beat -apply:bps cpp_patch.bps a1.txt patched.file
          diff a2.txt patched.file
          pat_bytes=$(stat -c%s "cpp_patch.bps")
          bun run beat.ts -create:bps ts_patch.bps a1.txt a2.txt
          diff cpp_patch.bps ts_patch.bps && echo "Fonzie Test passed, size = $pat_bytes"

      - name: c/d Tests
        run: |
          function patch_test {
            beat-cpp/beat/out/beat -create:bps cpp_patch.bps $1 $2 > /dev/null
            beat-cpp/beat/out/beat -apply:bps cpp_patch.bps $1 patched.file > /dev/null
            diff $2 patched.file
            rm patched.file
            bun run beat.ts -create:bps ts_patch.bps $1 $2 > /dev/null
            diff cpp_patch.bps ts_patch.bps && echo "$1 -> $2 passed"
          }
          dd if=/dev/zero bs=1 count=1024 | tr '\0' 'c' > c.txt
          dd if=/dev/zero bs=1 count=1024 | tr '\0' 'd' > d.txt
          cp c.txt cd.txt
          cat d.txt >> cd.txt
          patch_test cd.txt c.txt || exit 1
          patch_test cd.txt d.txt || exit 1
          patch_test c.txt cd.txt || exit 1
          patch_test d.txt cd.txt || exit 1

      - name: beat.cpp beat.png - failure
        run: |
          beat-cpp/beat/out/beat -create:bps cpp_patch.bps beat-cpp/beat/resource/beat.ico beat-cpp/beat/resource/beat.png
          bun run beat.ts -create:bps ts_patch.bps beat-cpp/beat/beat.cpp beat-cpp/beat/resource/beat.png
          ! diff cpp_patch.bps ts_patch.bps && echo 'beat.cpp beat.png patch correctly failed'

